name: Publish to Microsoft Store

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Store Product ID (optional — reads from STORE_APP_ID secret if empty)'
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: read

# MSStore CLI reads credentials from these env vars automatically (no reconfigure needed)
env:
  PARTNER_CENTER_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  PARTNER_CENTER_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}

jobs:
  publish:
    name: Publish MSIX to Store
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Determine App ID ──
      - name: Resolve App ID
        id: appid
        shell: pwsh
        run: |
          $appId = "${{ inputs.app_id }}"
          if ([string]::IsNullOrWhiteSpace($appId)) {
            $appId = "${{ secrets.STORE_APP_ID }}"
          }
          if ([string]::IsNullOrWhiteSpace($appId)) {
            throw "No App ID. Set STORE_APP_ID secret or provide it as input."
          }
          Write-Host "App ID: $appId"
          echo "APP_ID=$appId" >> $env:GITHUB_OUTPUT

      # ── Download MSIX from latest release ──
      - name: Download MSIX from release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get release info
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
          } else {
            $tag = "latest"
          }
          Write-Host "Downloading MSIX from release: $tag"

          New-Item -ItemType Directory -Path "store-upload" -Force | Out-Null

          if ($tag -eq "latest") {
            $release = gh api repos/${{ github.repository }}/releases/latest | ConvertFrom-Json
          } else {
            $release = gh api repos/${{ github.repository }}/releases/tags/$tag | ConvertFrom-Json
          }

          # Download x64 MSIX
          $msixAsset = $release.assets | Where-Object { $_.name -eq "langover-x64.msix" }
          if (!$msixAsset) { throw "langover-x64.msix not found in release $tag" }

          Write-Host "Downloading: $($msixAsset.name) ($($msixAsset.size) bytes)"
          gh api $msixAsset.url -H "Accept: application/octet-stream" > "store-upload/langover-x64.msix"

          # Also download x86 MSIX
          $msixAssetX86 = $release.assets | Where-Object { $_.name -eq "langover-x86.msix" }
          if ($msixAssetX86) {
            Write-Host "Downloading: $($msixAssetX86.name) ($($msixAssetX86.size) bytes)"
            gh api $msixAssetX86.url -H "Accept: application/octet-stream" > "store-upload/langover-x86.msix"
          }

          Get-ChildItem "store-upload" | Format-Table Name, Length

      # ── Setup Microsoft Store Developer CLI ──
      - name: Setup MSStore Developer CLI
        uses: microsoft/setup-msstore-cli@v1

      # ── Validate and log credential presence ──
      - name: Validate credentials
        shell: pwsh
        run: |
          $ok = $true
          $guidPattern = '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'

          function Test-Secret($name, $value, $pattern) {
            if ([string]::IsNullOrWhiteSpace($value)) {
              Write-Host "::error::$name is EMPTY or NOT SET"
              return $false
            }
            $len = $value.Length
            Write-Host "$name is set (length: $len)"
            if ($pattern -and $value -notmatch $pattern) {
              Write-Host "::error::$name has invalid format (expected pattern: $pattern)"
              return $false
            }
            Write-Host "  -> format OK"
            return $true
          }

          Write-Host "=== Credential Format Check ==="
          if (-not (Test-Secret "AZURE_TENANT_ID"          "${{ secrets.AZURE_TENANT_ID }}"          $guidPattern))  { $ok = $false }
          if (-not (Test-Secret "AZURE_CLIENT_ID"           "${{ secrets.AZURE_CLIENT_ID }}"          $guidPattern))  { $ok = $false }
          if (-not (Test-Secret "AZURE_CLIENT_SECRET"       "${{ secrets.AZURE_CLIENT_SECRET }}"      $null))         { $ok = $false }
          if (-not (Test-Secret "PARTNER_CENTER_SELLER_ID"  "${{ secrets.PARTNER_CENTER_SELLER_ID }}" '^\d+$'))       { $ok = $false }

          if (-not $ok) {
            throw "One or more credentials are missing or have wrong format. Check Settings > Secrets and variables > Actions."
          }
          Write-Host "=== All 4 credentials are set with valid format ==="

          # ── Actual authentication test against Azure AD ──
          Write-Host ""
          Write-Host "=== Testing Azure AD authentication ==="
          $tenantId    = "${{ secrets.AZURE_TENANT_ID }}"
          $clientId    = "${{ secrets.AZURE_CLIENT_ID }}"
          $clientSecret = "${{ secrets.AZURE_CLIENT_SECRET }}"

          $body = @{
            grant_type    = "client_credentials"
            client_id     = $clientId
            client_secret = $clientSecret
            resource         = "https://api.partner.microsoft.com"
          }

          try {
            $response = Invoke-RestMethod `
              -Uri "https://login.microsoftonline.com/$tenantId/oauth2/token" `
              -Method POST `
              -ContentType "application/x-www-form-urlencoded" `
              -Body $body

            if ($response.access_token) {
              Write-Host "Azure AD authentication SUCCEEDED — got a valid token"
              Write-Host "Token type: $($response.token_type), expires in: $($response.expires_in)s"
            } else {
              throw "No access_token in response"
            }
          }
          catch {
            Write-Host "::error::Azure AD authentication FAILED: $_"
            Write-Host ""
            Write-Host "This means AZURE_TENANT_ID, AZURE_CLIENT_ID, or AZURE_CLIENT_SECRET is wrong."
            Write-Host "Verify them in Azure Portal > App registrations > LangOver-Store-Publisher"
            throw "Azure AD authentication failed — check credentials"
          }

      # ── Configure credentials (reconfigure with all params to skip interactive prompts) ──
      - name: Configure Store credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId "${{ secrets.AZURE_TENANT_ID }}" `
            --sellerId "${{ secrets.PARTNER_CENTER_SELLER_ID }}" `
            --clientId "${{ secrets.AZURE_CLIENT_ID }}" `
            --clientSecret "${{ secrets.AZURE_CLIENT_SECRET }}"

      # ── Verify credentials work ──
      - name: Verify API access
        id: verify
        shell: pwsh
        run: |
          Write-Host "=== Verifying Partner Center API access ==="

          # ── Step 1: Try msstore CLI (uses Submission API v1 — only works for published apps) ──
          Write-Host "--- Testing msstore CLI (Submission API v1) ---"
          $env:ErrorActionPreference = "Continue"
          $output = msstore apps list 2>&1 | Out-String
          $cliExitCode = $LASTEXITCODE
          # Strip ANSI escape codes for reliable matching
          $cleanOutput = $output -replace '\x1b\[[0-9;]*m', ''
          Write-Host $cleanOutput

          if ($cliExitCode -eq 0 -and $cleanOutput -notmatch "no Managed apps") {
            Write-Host "msstore CLI found managed apps!"
            echo "HAS_MANAGED_APPS=true" >> $env:GITHUB_OUTPUT
            echo "USE_REST_API=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Write-Host "::warning::msstore CLI returned 'no managed apps' — this is normal for apps pending first certification."
          Write-Host ""

          # ── Step 2: Try Partner Center REST API directly to check app status ──
          Write-Host "--- Testing Partner Center REST API directly ---"
          $tenantId     = "${{ secrets.AZURE_TENANT_ID }}"
          $clientId     = "${{ secrets.AZURE_CLIENT_ID }}"
          $clientSecret = "${{ secrets.AZURE_CLIENT_SECRET }}"
          $appId        = "${{ steps.appid.outputs.APP_ID }}"

          # Get token
          $tokenBody = @{
            grant_type    = "client_credentials"
            client_id     = $clientId
            client_secret = $clientSecret
            resource         = "https://api.partner.microsoft.com"
          }
          $tokenResp = Invoke-RestMethod `
            -Uri "https://login.microsoftonline.com/$tenantId/oauth2/token" `
            -Method POST -ContentType "application/x-www-form-urlencoded" -Body $tokenBody
          $token = $tokenResp.access_token

          $headers = @{ Authorization = "Bearer $token" }

          # Try v2 API — works for apps that haven't been published yet
          Write-Host "Querying Partner Center API for app: $appId"
          try {
            $app = Invoke-RestMethod `
              -Uri "https://api.partner.microsoft.com/v1.0/ingestion/products/$appId" `
              -Headers $headers -Method GET
            Write-Host "App found via Partner Center API!"
            Write-Host "  Name: $($app.name)"
            Write-Host "  ID: $($app.id)"
            Write-Host "  Type: $($app.resourceType)"

            # Check current submissions
            try {
              $subs = Invoke-RestMethod `
                -Uri "https://api.partner.microsoft.com/v1.0/ingestion/products/$appId/submissions" `
                -Headers $headers -Method GET
              $subList = $subs.value
              Write-Host "  Submissions found: $($subList.Count)"
              foreach ($sub in $subList) {
                Write-Host "    - ID=$($sub.id) state=$($sub.state) subState=$($sub.subState)"
              }

              # If there's a pending submission, we can't create a new one
              $pending = $subList | Where-Object { $_.state -eq "InProgress" -or $_.subState -eq "InReview" -or $_.subState -eq "Certification" }
              if ($pending) {
                Write-Host ""
                Write-Host "::warning::There is a submission currently in progress/review."
                Write-Host "::warning::You cannot submit an update until the current submission is processed."
                Write-Host "::warning::Check status at: https://partner.microsoft.com/dashboard"
                echo "HAS_MANAGED_APPS=false" >> $env:GITHUB_OUTPUT
                echo "USE_REST_API=false" >> $env:GITHUB_OUTPUT
                echo "PENDING_SUBMISSION=true" >> $env:GITHUB_OUTPUT
              } else {
                echo "HAS_MANAGED_APPS=true" >> $env:GITHUB_OUTPUT
                echo "USE_REST_API=true" >> $env:GITHUB_OUTPUT
              }
            }
            catch {
              Write-Host "::warning::Could not query submissions: $_"
              echo "HAS_MANAGED_APPS=false" >> $env:GITHUB_OUTPUT
              echo "USE_REST_API=false" >> $env:GITHUB_OUTPUT
            }
          }
          catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            Write-Host "::error::Partner Center API returned HTTP $statusCode"
            Write-Host "::error::$_"

            if ($statusCode -eq 404) {
              Write-Host ""
              Write-Host "App ID '$appId' was NOT found. Verify STORE_APP_ID secret is correct."
              Write-Host "Find your App ID in Partner Center > Your app > Product Identity"
            }
            elseif ($statusCode -eq 401 -or $statusCode -eq 403) {
              Write-Host ""
              Write-Host "Access denied. The Azure AD app may not have the right permissions."
              Write-Host "Verify in Partner Center > Account Settings > Azure AD applications"
            }

            echo "HAS_MANAGED_APPS=false" >> $env:GITHUB_OUTPUT
            echo "USE_REST_API=false" >> $env:GITHUB_OUTPUT
          }

      # ── Publish ──
      - name: Publish to Microsoft Store
        if: steps.verify.outputs.HAS_MANAGED_APPS == 'true'
        shell: pwsh
        run: |
          $appId = "${{ steps.appid.outputs.APP_ID }}"
          Write-Host "Publishing to Store App: $appId"
          msstore publish `
            --appId $appId `
            --inputDirectory "store-upload" `
            --tenant-id $env:PARTNER_CENTER_TENANT_ID `
            --seller-id $env:PARTNER_CENTER_SELLER_ID `
            --client-id $env:PARTNER_CENTER_CLIENT_ID `
            --client-secret $env:PARTNER_CENTER_CLIENT_SECRET
          
          if ($LASTEXITCODE -ne 0) {
            throw "Publishing to Microsoft Store failed."
          }

          Write-Host "=== Done! Check Partner Center for submission status ==="

      - name: Fail if cannot publish
        if: steps.verify.outputs.HAS_MANAGED_APPS == 'false'
        shell: pwsh
        run: |
          if ("${{ steps.verify.outputs.PENDING_SUBMISSION }}" -eq "true") {
            throw @"
          Cannot publish: There is already a submission in progress (pending certification).
          You must wait for the current submission to be approved or rejected before submitting an update.
          Check status at: https://partner.microsoft.com/dashboard
          "@
          } else {
            throw @"
          Cannot publish: The app was not found or is not accessible via the API.
          Possible causes:
            1. STORE_APP_ID is wrong — verify it in Partner Center > Product Identity
            2. The Azure AD app doesn't have permissions — check Partner Center > Account Settings > Azure AD applications
            3. PARTNER_CENTER_SELLER_ID is wrong — find the correct one in Partner Center > Account Settings > Organization profile > Legal info
          "@
          }

      # ── Poll submission status ──
      - name: Check submission status
        if: steps.verify.outputs.HAS_MANAGED_APPS == 'true'
        shell: pwsh
        continue-on-error: true
        run: |
          $appId = "${{ steps.appid.outputs.APP_ID }}"
          Write-Host "Checking submission status..."
          msstore submission status $appId 2>&1 | Out-String | Write-Host
